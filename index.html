<!DOCTYPE html>
<html>

<head>

<title>PathoWatch Risk Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

#map{
height:600px;
width:100%;
}

</style>

</head>

<body>

<h2>PathoWatch Pathogen Risk Map</h2>

<button onclick="runModel()">Generate Risk Map</button>

<div id="map"></div>

<script>

var map = L.map('map').setView([28.6139,77.2090],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'OpenStreetMap'
}).addTo(map);


var riskLayer;


function runModel(){

fetch("http://127.0.0.1:5000/run_model")

.then(response => response.json())

.then(data => {

loadRiskMap()

})

}


function loadRiskMap(){

if(riskLayer){

map.removeLayer(riskLayer)

}

var imageUrl = "http://127.0.0.1:5000/risk_map"

var bounds = [

[28.55,77.05],

[28.75,77.35]

]

riskLayer = L.imageOverlay(imageUrl,bounds)

riskLayer.addTo(map)

}
map.on('click', function(e){

var lat = e.latlng.lat
var lon = e.latlng.lng

fetch(`http://127.0.0.1:5000/risk_at_location?lat=${lat}&lon=${lon}`)

.then(response => response.json())

.then(data => {

L.popup()
.setLatLng([lat,lon])
.setContent(
"<b>Pathogen Risk</b><br>"+
"Probability: "+data.probability.toFixed(3)+"<br>"+
"Risk Level: "+data.risk_level
)
.openOn(map)

})

})
</script>

</body>

</html>
